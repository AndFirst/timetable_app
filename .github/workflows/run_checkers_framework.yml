name: Checker Framework Static Analysis

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build with Maven
      run: mvn clean install

    - name: Run Checker Framework
      run: mvn org.checkerframework:checkerframework-maven-plugin:3.31.0:check

    - name: Upload Checker Framework results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: checker-framework-result
        path: target/checker-result.xml
