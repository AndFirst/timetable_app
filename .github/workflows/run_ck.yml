name: CK Metrics

on:
  workflow_dispatch:

jobs:
  ck-analysis:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build with Maven
      run: mvn clean install

    - name: Download CK JAR
      run: curl -L -o ck.jar https://github.com/mauricioaniche/ck/releases/download/0.6.6/ck-0.6.6-jar-with-dependencies.jar

    - name: Run CK Metrics
      run: java -jar ck.jar target/classes true 0 false target/ck_metrics/

    - name: Upload CK Metrics Results
      uses: actions/upload-artifact@v4
      with:
        name: ck-metrics-results
        path: target/ck_metrics/
