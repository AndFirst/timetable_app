name: Tests and Coverage

on:
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build with Maven
      run: mvn clean compile

    - name: Run tests
      run: mvn test

    - name: Generate JaCoCo Coverage Report
      run: mvn jacoco:report

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: Coverage report
        path: target/site/jacoco/

    - name: Coverage report to PR
      uses: madrapps/jacoco-report@v1.3
      with:
        paths: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 80
        min-coverage-changed-files: 80

    - name: Check coverage percentage
      run: |
        COVERAGE=$(grep -oP 'Total.*?([0-9]{1,3})%' target/site/jacoco/index.html | grep -oP '[0-9]{1,3}')
        if [ -z "$COVERAGE" ]; then
          echo "Failed to extract coverage percentage"
          exit 1
        elif [ "$COVERAGE" -lt 80 ]; then
          echo "Test coverage is below 80%. Current coverage: $COVERAGE%"
          exit 1
        else
          echo "Test coverage is $COVERAGE%"
        fi